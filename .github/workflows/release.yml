name: Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archive_name: git-config-linux-x86_64.tar.gz
            binary_name: git-config
          - os: windows-latest
            archive_name: git-config-windows-x86_64.zip
            binary_name: git-config.exe
          - os: macos-latest
            archive_name: git-config-macos-arm64.tar.gz
            binary_name: git-config

    steps:
      - uses: actions/checkout@v6

      - name: Build release binary
        run: cargo build --release

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: tar -czf "${{ matrix.archive_name }}" -C target/release "${{ matrix.binary_name }}"

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "target/release/${{ matrix.binary_name }}" -DestinationPath "${{ matrix.archive_name }}"

      - name: Upload packaged binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" dist/*/* --generate-notes
